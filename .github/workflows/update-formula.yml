name: Update AOS formula

on:
  repository_dispatch:
    types: [aos-release]
  workflow_dispatch:
    inputs:
      version:
        description: AOS calendar-semver release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: update-aos-formula
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.client_payload.version || inputs.version }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release checksums
        run: |
          printf '%s\n' "$VERSION" | grep -Eq '^20[0-9]{2}\.[0-9]+\.[0-9]+$'
          BASE="https://github.com/unicity-aos/aos-ce/releases/download/${VERSION}"
          curl --proto '=https' --tlsv1.2 -fsSL "$BASE/SHA256SUMS.txt" -o SHA256SUMS.txt
          curl --proto '=https' --tlsv1.2 -fsSL "$BASE/SHA256SUMS.txt.sigstore.json" -o SHA256SUMS.txt.sigstore.json
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify release checksum identity
        run: |
          cosign verify-blob \
            --bundle SHA256SUMS.txt.sigstore.json \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/unicity-aos/aos-ce/.github/workflows/release.yml@refs/tags/${VERSION}" \
            SHA256SUMS.txt
      - name: Render formula
        run: |
          sha() {
            awk -v asset="$1" '$2 == asset { print $1; exit }' SHA256SUMS.txt
          }
          MAC_ARM=$(sha unicity-aos-aarch64-apple-darwin.tar.gz)
          MAC_INTEL=$(sha unicity-aos-x86_64-apple-darwin.tar.gz)
          LINUX_ARM=$(sha unicity-aos-aarch64-unknown-linux-gnu.tar.gz)
          LINUX_INTEL=$(sha unicity-aos-x86_64-unknown-linux-gnu.tar.gz)
          scripts/render-formula.sh "$VERSION" "$MAC_ARM" "$MAC_INTEL" "$LINUX_ARM" "$LINUX_INTEL"
          scripts/test-render-formula.sh
      - name: Commit formula
        run: |
          if git diff --quiet -- Formula/aos.rb; then
            echo "Formula is already current."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/aos.rb
          git commit -m "aos ${VERSION}"
          git push
