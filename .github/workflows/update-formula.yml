name: Update AOS formula

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-aos-formula
  cancel-in-progress: false

jobs:
  update:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Discover signed stable channel
        id: channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL_TAG=$(scripts/discover-stable-channel.sh)
          if [[ -z "$CHANNEL_TAG" ]]; then
            echo "No signed AOS stable channel exists; the tap remains dormant."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$CHANNEL_TAG" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: steps.channel.outputs.found == 'true'
      - name: Download and authenticate stable channel
        if: steps.channel.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          gh release download "$CHANNEL_TAG" \
            --repo unicity-aos/aos-ce \
            --pattern channel.toml \
            --pattern channel.toml.sigstore.json
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/promote-channel.yml@refs/heads/main"
          cosign verify-blob \
            --bundle channel.toml.sigstore.json \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$IDENTITY" \
            --use-signed-timestamps \
            channel.toml
      - name: Enforce accepted channel generation
        if: steps.channel.outputs.found == 'true'
        id: accepted
        run: |
          accepted=()
          if [[ -e Formula/channel-stable.toml || -e Formula/channel-stable.toml.sigstore.json ]]; then
            [[ -f Formula/channel-stable.toml ]]
            [[ -f Formula/channel-stable.toml.sigstore.json ]]
            IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/promote-channel.yml@refs/heads/main"
            cosign verify-blob \
              --bundle Formula/channel-stable.toml.sigstore.json \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$IDENTITY" \
              --use-signed-timestamps \
              Formula/channel-stable.toml
            accepted=(
              --accepted-channel Formula/channel-stable.toml
              --accepted-bundle Formula/channel-stable.toml.sigstore.json
            )
          fi
          python3 scripts/channel_release.py inspect-channel \
            --channel channel.toml \
            --channel-bundle channel.toml.sigstore.json \
            "${accepted[@]}" > channel.json
          STATUS=$(jq -er .status channel.json)
          VERSION=$(jq -er .version channel.json)
          METADATA=$(jq -er .metadata_asset channel.json)
          IDENTITY=$(jq -er .release_workflow_identity channel.json)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          {
            echo "VERSION=$VERSION"
            echo "RELEASE_METADATA=$METADATA"
            echo "RELEASE_IDENTITY=$IDENTITY"
          } >> "$GITHUB_ENV"
      - name: Download and authenticate immutable release metadata
        if: steps.channel.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$VERSION" \
            --repo unicity-aos/aos-ce \
            --pattern "$RELEASE_METADATA" \
            --pattern "$RELEASE_METADATA.sigstore.json"
          cosign verify-blob \
            --bundle "$RELEASE_METADATA.sigstore.json" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$RELEASE_IDENTITY" \
            --use-signed-timestamps \
            "$RELEASE_METADATA"
          gh release view "$VERSION" \
            --repo unicity-aos/aos-ce \
            --json isDraft,isPrerelease,tagName > release-state.json
          TAG_OBJECT=$(gh api "repos/unicity-aos/aos-ce/git/ref/tags/$VERSION")
          TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
          TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          for _ in {1..8}; do
            [[ "$TAG_TYPE" == tag ]] || break
            TAG_OBJECT=$(gh api "repos/unicity-aos/aos-ce/git/tags/$TAG_COMMIT")
            TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
            TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          done
          [[ "$TAG_TYPE" == commit ]] || {
            echo "release tag does not peel to a commit" >&2
            exit 1
          }
          python3 scripts/channel_release.py verify-release \
            --channel channel.toml \
            --release "$RELEASE_METADATA" \
            --release-state release-state.json \
            --tag-commit "$TAG_COMMIT" > release.json
      - name: Render authenticated formula
        if: steps.channel.outputs.found == 'true'
        run: |
          scripts/render-formula.sh \
            "$(jq -er .version release.json)" \
            "$(jq -er '.targets["aarch64-apple-darwin"].sha256' release.json)" \
            "$(jq -er '.targets["x86_64-apple-darwin"].sha256' release.json)" \
            "$(jq -er '.targets["aarch64-unknown-linux-gnu"].sha256' release.json)" \
            "$(jq -er '.targets["x86_64-unknown-linux-gnu"].sha256' release.json)"
          scripts/validate-formula.sh Formula/aos.rb "$VERSION"
      - name: Detect atomic state change
        if: steps.channel.outputs.found == 'true'
        id: state
        run: |
          if [[ "${{ steps.accepted.outputs.status }}" == unchanged ]] && \
             [[ -z "$(git status --porcelain -- Formula/aos.rb)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Formula and accepted stable channel are already current."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Audit formula
        if: steps.state.outputs.changed == 'true'
        run: |
          brew tap unicity-aos/tap
          cp Formula/aos.rb "$(brew --repository unicity-aos/tap)/Formula/aos.rb"
          brew trust --formula unicity-aos/tap/aos
          brew audit --strict unicity-aos/tap/aos
      - name: Publish atomic signed state
        if: steps.state.outputs.changed == 'true'
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/create-signed-commit-payload.sh \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_SHA" \
            "$VERSION" \
            Formula/aos.rb \
            channel.toml \
            channel.toml.sigstore.json > "$RUNNER_TEMP/commit-formula.json"
          gh api graphql --input "$RUNNER_TEMP/commit-formula.json" \
            > "$RUNNER_TEMP/commit-formula-response.json"
          oid=$(jq -er '
            .data.createCommitOnBranch.commit
            | select(.signature.isValid == true and .signature.wasSignedByGitHub == true)
            | .oid
          ' "$RUNNER_TEMP/commit-formula-response.json")
          url=$(jq -er '.data.createCommitOnBranch.commit.url' "$RUNNER_TEMP/commit-formula-response.json")
          echo "sha=$oid" >> "$GITHUB_OUTPUT"
          echo "Published verified commit $oid: $url"
      - name: Validate published main
        if: steps.publish.outputs.sha != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ steps.publish.outputs.sha }}
        run: |
          gh workflow run ci.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f expected_sha="$EXPECTED_SHA"

          run_id=
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --event workflow_dispatch \
              --commit "$EXPECTED_SHA" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            [[ -n "$run_id" ]] && break
            sleep 2
          done
          [[ -n "$run_id" ]]
          gh run watch "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --interval 10 \
            --exit-status
