name: Update AOS formula

on:
  repository_dispatch:
    types: [aos-release]
  workflow_dispatch:
    inputs:
      version:
        description: AOS calendar-semver release
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: update-aos-formula
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.event.client_payload.version || inputs.version }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release checksums
        run: |
          printf '%s\n' "$VERSION" | grep -Eq '^20[0-9]{2}\.[0-9]+\.[0-9]+$'
          BASE="https://github.com/unicity-aos/aos-ce/releases/download/${VERSION}"
          curl --proto '=https' --tlsv1.2 -fsSL "$BASE/SHA256SUMS.txt" -o SHA256SUMS.txt
          curl --proto '=https' --tlsv1.2 -fsSL "$BASE/SHA256SUMS.txt.sigstore.json" -o SHA256SUMS.txt.sigstore.json
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify release checksum identity
        run: |
          cosign verify-blob \
            --bundle SHA256SUMS.txt.sigstore.json \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/unicity-aos/aos-ce/.github/workflows/release.yml@refs/tags/${VERSION}" \
            SHA256SUMS.txt
      - name: Render formula
        run: |
          sha() {
            awk -v asset="$1" '$2 == asset { print $1; exit }' SHA256SUMS.txt
          }
          MAC_ARM=$(sha unicity-aos-aarch64-apple-darwin.tar.gz)
          MAC_INTEL=$(sha unicity-aos-x86_64-apple-darwin.tar.gz)
          LINUX_ARM=$(sha unicity-aos-aarch64-unknown-linux-gnu.tar.gz)
          LINUX_INTEL=$(sha unicity-aos-x86_64-unknown-linux-gnu.tar.gz)
          scripts/render-formula.sh "$VERSION" "$MAC_ARM" "$MAC_INTEL" "$LINUX_ARM" "$LINUX_INTEL"
          scripts/validate-formula.sh Formula/aos.rb "$VERSION"
      - name: Audit formula
        run: |
          brew tap unicity-aos/tap
          cp Formula/aos.rb "$(brew --repository unicity-aos/tap)/Formula/aos.rb"
          brew trust --formula unicity-aos/tap/aos
          brew audit --strict unicity-aos/tap/aos
      - name: Detect formula change
        id: formula
        run: |
          if [[ -z "$(git status --porcelain -- Formula/aos.rb)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Formula is already current."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish signed formula commit
        if: steps.formula.outputs.changed == 'true'
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/create-signed-commit-payload.sh \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_SHA" \
            "$VERSION" \
            Formula/aos.rb > "$RUNNER_TEMP/commit-formula.json"
          gh api graphql --input "$RUNNER_TEMP/commit-formula.json" \
            > "$RUNNER_TEMP/commit-formula-response.json"
          oid=$(jq -er '
            .data.createCommitOnBranch.commit
            | select(.signature.isValid == true and .signature.wasSignedByGitHub == true)
            | .oid
          ' "$RUNNER_TEMP/commit-formula-response.json")
          url=$(jq -er '.data.createCommitOnBranch.commit.url' "$RUNNER_TEMP/commit-formula-response.json")
          echo "sha=$oid" >> "$GITHUB_OUTPUT"
          echo "Published verified commit $oid: $url"
      - name: Validate published main
        if: steps.formula.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ steps.publish.outputs.sha }}
        run: |
          gh workflow run ci.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f expected_sha="$EXPECTED_SHA"

          run_id=
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --event workflow_dispatch \
              --commit "$EXPECTED_SHA" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            [[ -n "$run_id" ]] && break
            sleep 2
          done
          [[ -n "$run_id" ]]
          gh run watch "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --interval 10 \
            --exit-status
